services:
  mongodb:
    image: mongo:latest
    container_name: campus-mongo
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db
    networks:
      - campus-network

  postgres:
    image: postgres:latest
    container_name: campus-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: campus_pg
      # Added PGDATA to support the parent-folder mount strategy
      PGDATA: /var/lib/postgresql/data/pgdata 
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql
    networks:
      - campus-network
    healthcheck:
          test: ["CMD-SHELL", "pg_isready -U your_db_user -d your_db_name"]
          interval: 5s
          timeout: 5s
          retries: 5
  backend:
    build: ./backend
    container_name: campus-backend
    ports:
      - "5000:5000"
    env_file:
      - ./backend/.env
    environment:
      # Force development mode so npm installs devDependencies (nodemon)
      - NODE_ENV=production 
    volumes:
      - ./backend:/app
      - /app/node_modules # Critical: Prevents local folder from wiping container modules
    depends_on:
      - mongodb
      - postgres
    networks:
      - campus-network

  frontend:
    build: ./frontend
    container_name: campus-frontend
    ports:
      - "4173:4173" # Matches your Vite log: "Local: http://localhost:4173/"
    env_file:
      - ./frontend/.env
    volumes:
      - ./frontend:/app
      - /app/node_modules # Critical: Ensures @react-oauth/google stays available
    depends_on:
      - backend
    networks:
      - campus-network

volumes:
  mongo-data:
  postgres-data:

networks:
  campus-network:
    driver: bridge